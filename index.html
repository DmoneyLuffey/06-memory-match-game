<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Memory Match Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Game Header -->
        <header class="game-header">
            <h1>🎮 Emoji Memory Match Game</h1>
            <p class="subtitle">Match all pairs to win!</p>
        </header>

        <!-- Game Stats Section -->
        <div class="game-stats">
            <div class="stat">
                <span class="stat-label">Moves:</span>
                <span class="stat-value" id="moves-count">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Matches:</span>
                <span class="stat-value" id="matches-count">0/8</span>
            </div>
            <div class="stat">
                <span class="stat-label">Time:</span>
                <span class="stat-value" id="time-count">0s</span>
            </div>
        </div>

        <!-- Game Board -->
        <div class="game-board" id="game-board">
            <!-- Cards are generated by JavaScript -->
        </div>

        <!-- Restart Button -->
        <button class="restart-btn" id="restart-btn">🔄 Restart Game</button>

        <!-- Win Message -->
        <div class="win-modal" id="win-modal">
            <div class="win-content">
                <h2>🎉 You Win! 🎉</h2>
                <p>Congratulations! You completed the game!</p>
                <div class="win-stats">
                    <p>Total Moves: <strong id="final-moves">0</strong></p>
                    <p>Total Time: <strong id="final-time">0s</strong></p>
                </div>
                <button class="play-again-btn" id="play-again-btn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
